name: Job Intel — Daily Run

on:
  schedule:
    - cron: '30 2 * * *'   # 08:00 AM IST = 02:30 UTC every day
  workflow_dispatch:         # manual trigger button in GitHub Actions UI

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Intel Agent
        run: python main.py
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          EMAIL_ENABLED:  "true"
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          SMTP_HOST:      "smtp-relay.brevo.com"
          SMTP_PORT:      "587"
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}

      - name: Commit seen_jobs.json and reports back to repo
        run: |
          git config user.name  "job-intel-bot"
          git config user.email "actions@github.com"
          git add logs/seen_jobs.json reports/ || true
          git diff --staged --quiet || git commit -m "chore: daily run $(date +%Y-%m-%d)"
          git push || true